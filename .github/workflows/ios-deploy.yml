name: Deploy to TestFlight

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes for TestFlight"
        required: false
        default: "Bug fixes and improvements"

# Required GitHub Secrets:
#   APP_STORE_CONNECT_API_KEY_ID       - Key ID (e.g. XXXXXXXXXX)
#   APP_STORE_CONNECT_API_ISSUER_ID    - Issuer ID (UUID)
#   APP_STORE_CONNECT_API_KEY_CONTENT  - Private key content (.p8 file, base64 encoded)
#   P12_BASE64                         - Distribution certificate (.p12, base64 encoded)
#   P12_PASSWORD                       - Password for the .p12 file
#   PROVISIONING_PROFILE_BASE64        - App Store provisioning profile (.mobileprovision, base64 encoded)
#   PROVISIONING_PROFILE_NAME          - Profile name (as shown in Apple Developer portal)
#   CODE_SIGN_IDENTITY                 - e.g. "iPhone Distribution: Your Name (TEAMID)"

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        working-directory: game
        run: npm install

      - name: Build web app
        working-directory: game
        run: npm run build

      - name: Add iOS platform
        working-directory: game
        run: npx cap add ios

      - name: Sync Capacitor
        working-directory: game
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: game/ios/App
        run: pod install

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: game

      - name: Import distribution certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/cert.p12

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/app.mobileprovision

      - name: Bump build number
        working-directory: game/ios/App
        run: xcrun agvtool new-version -all ${{ github.run_number }}

      - name: Build & upload via Fastlane
        working-directory: game
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
          RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: bundle exec fastlane ios beta
